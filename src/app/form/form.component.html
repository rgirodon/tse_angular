<div *ngIf="hasError" class="error">
    Errors in form validation
</div>
<div *ngIf="isValid" class="valid">
    Form valid
</div>
<div>
    Login : <input type="text" [(ngModel)]="login">
</div>
<div>
    Password : <input type="password" [(ngModel)]="password">
</div>
<div>
    Confirm password : <input type="password" [(ngModel)]="confirm_password">
</div>
<div>
    <button (click)="validate()">Validate</button>
</div>
